<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Glow center -->
  <circle cx="32" cy="32" r="18" fill="url(#glow)"/>
  <!-- Outer focus ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Middle focus ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Center dot (bright) -->
  <circle cx="32" cy="32" r="4" fill="white"/>
  <circle cx="32" cy="32" r="2" fill="#c4b5fd"/>
  <!-- Corner brackets — top-left -->
  <path d="M14 20 L14 14 L20 14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- top-right -->
  <path d="M44 14 L50 14 L50 20" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-left -->
  <path d="M14 44 L14 50 L20 50" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom-right -->
  <path d="M50 44 L50 50 L44 50" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
